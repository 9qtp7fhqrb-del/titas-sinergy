name: Atualizar D360 — Vendas

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Carregar token ERP cacheado
        id: load_token
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/ERP_TOKEN_CACHE" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('value',''))" 2>/dev/null || echo "")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Rodar script de atualização
        env:
          ERP_LOGIN: ${{ secrets.ERP_LOGIN }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
          ERP_TOKEN_CACHE: ${{ steps.load_token.outputs.token }}
          ERP_TOKEN_OUTPUT: /tmp/erp_new_token.txt
          INDEX_HTML: index.html
        run: python scripts/update_d360.py

      - name: Salvar token no cache (se renovado)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ERP_TOKEN_OUTPUT: /tmp/erp_new_token.txt
        run: python scripts/save_erp_token.py

      - name: Verificar se houve alterações
        id: diff
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit das alterações
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "D360-Bot"
          git config user.email "bot@titas-sinergy.web.app"
          git add index.html
          git commit -m "data: vendas $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"

      - name: Deploy Firebase Hosting
        if: steps.diff.outputs.changed == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools --silent
          firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive

      - name: Push para GitHub
        if: steps.diff.outputs.changed == 'true'
        run: git push
