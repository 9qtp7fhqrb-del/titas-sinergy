<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d1f"/>
      <stop offset="100%" style="stop-color:#111530"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
  </defs>

  <!-- Fundo circular escuro -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Borda dourada -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Átomo: 3 elipses orbitais -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.6">
    <!-- Órbita horizontal -->
    <ellipse cx="32" cy="32" rx="16" ry="6"/>
    <!-- Órbita inclinada 60° -->
    <ellipse cx="32" cy="32" rx="16" ry="6" transform="rotate(60 32 32)"/>
    <!-- Órbita inclinada -60° -->
    <ellipse cx="32" cy="32" rx="16" ry="6" transform="rotate(-60 32 32)"/>
  </g>

  <!-- Núcleo central -->
  <circle cx="32" cy="32" r="3" fill="url(#gold)"/>
</svg>
